name: Pipeline de Integracao Continua

# O pipeline será executado automaticamente quando ocorrer um push
on: [push]

jobs:
  execucao-automatica:
    runs-on: ubuntu-latest # Ambiente onde o pipeline vai rodar

    steps:
      # Passo 0: Baixar o código do repositório (Necessário para listar os arquivos e rodar scripts)
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      # Requisito A: Exibir mensagem no console
      - name: Exibir Mensagem
        run: echo "🚀 Pipeline iniciado! Detectamos um novo push no repositório."

      # Requisito B: Listar arquivos do projeto
      - name: Listar Arquivos do Projeto
        run: |
          echo "📁 Estrutura de arquivos atual do repositório:"
          ls -la

      # Requisito C: Instalar as dependências
      - name: Instalar dependências
        run: npm install   

      # Requisito D: Executar script do projeto / Validação
      - name: Executar Script de Validação
        run: |
          echo "⚙️ Executando validação do projeto..."
          npm run dev &
          SERVER_PID=$!
          sleep 5
          kill $SERVER_PID
          echo "✅ Execução validada com sucesso!"
